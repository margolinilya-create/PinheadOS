name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update visual snapshots (baseline)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pinhead-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pinhead-react/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  visual:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pinhead-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pinhead-react/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build && npm run preview &
      - run: sleep 3
      - run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            npm run e2e:update
          else
            npm run e2e
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: pinhead-react/test-results/
          retention-days: 7
