name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update visual snapshots (baseline)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pinhead-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pinhead-react/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  visual:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    defaults:
      run:
        working-directory: pinhead-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pinhead-react/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build && npm run preview &
      - run: sleep 3
      - name: Decide snapshot mode
        id: snap
        # update-режим: явный запрос через workflow_dispatch ЛИБО эталонов нет
        # вовсе (self-heal — свежие эталоны сгенерятся и закоммитятся на main)
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ] || [ -z "$(ls e2e/visual.spec.ts-snapshots/*.png 2>/dev/null)" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi
      - run: |
          if [ "${{ steps.snap.outputs.update }}" = "true" ]; then
            npx playwright test e2e/visual.spec.ts --update-snapshots
          else
            npx playwright test e2e/visual.spec.ts
          fi
      - name: Commit updated snapshots
        if: ${{ steps.snap.outputs.update == 'true' && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots
          git diff --cached --quiet || git commit -m "test(visual): обновление эталонных скриншотов [skip ci]"
          git push
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: pinhead-react/test-results/
          retention-days: 7
